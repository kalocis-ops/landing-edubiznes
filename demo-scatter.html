<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Demo — Od Tablicy do Biznesu Online</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f3ef;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { display: block; cursor: default; }
  #tooltip {
    position: fixed;
    background: #001f5c;
    color: #fff;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    z-index: 10;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// ── CONFIG ─────────────────────────────────────────────────────
const SPEED = 0.00022;     // rad/ms — slow, elegant
const CARD_W = 240;
const CARD_H = 320;
const RX_FRAC = 0.78;      // orbit goes well off-screen
const RY_FRAC = 0.10;      // shallow depth

// ── CARD DATA ──────────────────────────────────────────────────
const cards = [
  { label: 'Kurs Online',      sub: 'Stwórz kurs w 30 dni',     src: 'assets/orbit-images/laptop-course.png' },
  { label: 'Wzrost Dochodów',  sub: '5 000–20 000 zł/mies.',    src: 'assets/orbit-images/income-growth.png' },
  { label: 'Przestrzeń Pracy', sub: 'Twój własny rytm',         src: 'assets/orbit-images/teacher-desk.png' },
  { label: 'Narzędzia AI',     sub: 'AI dla nauczyciela',        src: 'assets/orbit-images/ai-chat.png' },
  { label: 'Społeczność',      sub: '130 000 obserwujących',     src: 'assets/orbit-images/community.png' },
  { label: 'Certyfikat',       sub: 'Google Educator II st.',    src: 'assets/orbit-images/certificate.png' },
  { label: 'Webinar Live',     sub: '30 czerwca · 20:00',        src: 'assets/orbit-images/webinar-stage.png' },
];

const N = cards.length;
let state = cards.map((card, i) => ({
  angle: (2 * Math.PI * i) / N,
  card,
  hovered: false,
  scale: 1,
  img: null,
}));

// Klaudia
const klaudiaImg = new Image();
klaudiaImg.src = '2O9A0761.jpg';

// Preload card images
state.forEach(s => {
  const img = new Image();
  img.onload = () => { s.img = img; buildCardCache(s); };
  img.src = s.card.src;
});

// ── OFFSCREEN CARD CACHE ───────────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function makeCard(s, w, h) {
  const oc = document.createElement('canvas');
  oc.width = w * 2; oc.height = h * 2;
  const c = oc.getContext('2d');
  c.scale(2, 2);

  // White card with shadow drawn via compositing trick
  c.save();
  roundRect(c, 2, 4, w - 4, h - 4, 18);
  c.fillStyle = '#ffffff';
  c.shadowColor = 'rgba(0,31,92,0.14)';
  c.shadowBlur = 28;
  c.shadowOffsetY = 8;
  c.fill();
  c.restore();

  // Photo area (top 72%)
  const photoH = h * 0.72;
  c.save();
  roundRect(c, 2, 4, w - 4, photoH - 4, 18);
  // only clip top portion with a rect
  c.beginPath();
  c.rect(0, 0, w, photoH);
  c.clip();
  roundRect(c, 2, 4, w - 4, h - 4, 18);
  c.clip();

  if (s.img) {
    const iw = s.img.naturalWidth, ih = s.img.naturalHeight;
    const scale = Math.max((w - 4) / iw, photoH / ih);
    const dw = iw * scale, dh = ih * scale;
    c.drawImage(s.img, 2 + ((w - 4) - dw) / 2, 4 + (photoH - dh) / 2, dw, dh);
  } else {
    c.fillStyle = '#e8e4de';
    c.fillRect(2, 4, w - 4, photoH - 4);
  }
  c.restore();

  // Mint accent bar
  c.fillStyle = '#44d498';
  c.fillRect(w * 0.08, photoH + 10, w * 0.06, 3);

  // Label
  c.fillStyle = '#001f5c';
  c.font = `bold 14px "Segoe UI", system-ui`;
  c.textAlign = 'left';
  c.textBaseline = 'alphabetic';
  c.fillText(s.card.label, w * 0.08, photoH + 30);

  // Sub
  c.fillStyle = '#6b7a8d';
  c.font = `11px "Segoe UI", system-ui`;
  c.fillText(s.card.sub, w * 0.08, photoH + 48);

  return oc;
}

const cardCache = state.map(s => makeCard(s, CARD_W, CARD_H));

function buildCardCache(s) {
  const i = state.indexOf(s);
  if (i >= 0) cardCache[i] = makeCard(s, CARD_W, CARD_H);
}

// ── RESIZE ─────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── DRAW ───────────────────────────────────────────────────────
let last = 0;
let hoveredIdx = -1;

function draw(ts) {
  const dt = Math.min(ts - last, 40);
  last = ts;

  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const rx = W * RX_FRAC;
  const ry = H * RY_FRAC;

  ctx.clearRect(0, 0, W, H);

  // Advance + smooth scale
  for (const s of state) {
    s.angle += SPEED * dt;
    s.scale += ((s.hovered ? 1.14 : 1) - s.scale) * 0.1;
  }

  // Positions
  const items = state.map((s, i) => {
    const x = cx + rx * Math.cos(s.angle);
    const y = cy + ry * Math.sin(s.angle);
    const depth = (Math.sin(s.angle) + 1) / 2;  // 0=back, 1=front
    return { s, i, x, y, depth };
  });

  // Sort: draw back items, then Klaudia, then front items
  const back  = items.filter(it => it.depth < 0.5).sort((a, b) => b.depth - a.depth);
  const front = items.filter(it => it.depth >= 0.5).sort((a, b) => a.depth - b.depth);

  const drawCard = ({ s, i, x, y, depth }) => {
    const alpha = 0.25 + depth * 0.75;
    const sc = (0.6 + depth * 0.4) * s.scale;
    const cw = CARD_W * sc;
    const ch = CARD_H * sc;

    // Skip if fully off screen (with margin)
    if (x + cw / 2 < -20 || x - cw / 2 > W + 20) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.drawImage(cardCache[i], x - cw / 2, y - ch / 2, cw, ch);
    ctx.restore();
  };

  back.forEach(drawCard);

  // ── Klaudia (always in front of back cards, behind front cards) ──
  if (klaudiaImg.complete && klaudiaImg.naturalWidth > 0) {
    const r = Math.min(W * 0.12, H * 0.20, 180);

    // Soft shadow circle
    ctx.save();
    ctx.shadowColor = 'rgba(0,31,92,0.15)';
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();

    // Clip & draw photo
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();
    const aspect = klaudiaImg.naturalHeight / klaudiaImg.naturalWidth;
    const diam = r * 2;
    ctx.drawImage(klaudiaImg, cx - r, cy - r, diam, diam * aspect);
    ctx.restore();

    // Mint ring
    ctx.save();
    ctx.strokeStyle = '#44d498';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Name beneath
    ctx.save();
    ctx.textAlign = 'center';
    const fs = Math.max(13, r * 0.12);
    ctx.fillStyle = '#001f5c';
    ctx.font = `bold ${fs}px "Segoe UI", system-ui`;
    ctx.fillText('Klaudia Rogalska-Kalota', cx, cy + r + fs * 1.7);
    ctx.fillStyle = '#44d498';
    ctx.font = `${Math.max(11, fs * 0.82)}px "Segoe UI", system-ui`;
    ctx.fillText('Webinar 30 czerwca · 20:00', cx, cy + r + fs * 3.1);
    ctx.restore();
  }

  front.forEach(drawCard);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ── HOVER ──────────────────────────────────────────────────────
function hitTest(mx, my) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const rx = W * RX_FRAC, ry = H * RY_FRAC;

  // Test front-to-back (highest depth first)
  const sorted = state.map((s, i) => ({ s, i, depth: (Math.sin(s.angle) + 1) / 2 }))
    .sort((a, b) => b.depth - a.depth);

  for (const { s, i, depth } of sorted) {
    const x = cx + rx * Math.cos(s.angle);
    const y = cy + ry * Math.sin(s.angle);
    const sc = (0.6 + depth * 0.4) * s.scale;
    const hw = (CARD_W * sc) / 2;
    const hh = (CARD_H * sc) / 2;
    if (mx >= x - hw && mx <= x + hw && my >= y - hh && my <= y + hh) return i;
  }
  return -1;
}

canvas.addEventListener('mousemove', e => {
  const idx = hitTest(e.clientX, e.clientY);
  if (idx !== hoveredIdx) {
    if (hoveredIdx >= 0) state[hoveredIdx].hovered = false;
    hoveredIdx = idx;
    if (idx >= 0) state[idx].hovered = true;
  }
  if (idx >= 0) {
    canvas.style.cursor = 'pointer';
    tooltip.style.opacity = '1';
    tooltip.textContent = cards[idx].label + '  ·  ' + cards[idx].sub;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 36) + 'px';
  } else {
    canvas.style.cursor = 'default';
    tooltip.style.opacity = '0';
  }
});

canvas.addEventListener('mouseleave', () => {
  if (hoveredIdx >= 0) state[hoveredIdx].hovered = false;
  hoveredIdx = -1;
  tooltip.style.opacity = '0';
  canvas.style.cursor = 'default';
});
</script>
</body>
</html>
